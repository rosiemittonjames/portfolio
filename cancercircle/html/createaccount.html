<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link href="createaccountstyle.css" rel="stylesheet" type="text/css">
    
</head>
<body>
    <main>
        <section class="grid-container-flex">

            <form action="question1.html" method="GET" onsubmit="return validateForm(event)">
                <div class="container">
                  <h1>create account</h1>
                  <h2>to join our supportive cancer community</h2>
              
                  <label for="email"><b>email</b></label>
                  <input type="email" placeholder="enter email" name="email" id="email" required>

                  <label for="psw"><b>password</b></label>
                    <input type="password" placeholder="enter password" name="psw" id="psw" required>

                    <label for="psw-repeat"><b>repeat password</b></label>
                    <input type="password" placeholder="repeat password" name="psw-repeat" id="psw-repeat" required>
              

                    <button type="submit" class="nextbtn"></a>register</button>
                </div>
              
               
                  <p>already have an account? <a href="signin.html">sign in</a>.</p>
              </form>
            
              <script>
                function validateForm(event) {
                    const emailInput = document.getElementById("email");
                    const passwordInput = document.getElementById("psw");
                    const confirmPasswordInput = document.getElementById("psw-repeat");

                    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                    // Check if email is valid
                    if (!emailPattern.test(emailInput.value)) {
                        alert("Please enter a valid email address.");
                        event.preventDefault();
                        return false;
                    }

                    // Check if passwords match
                    if (passwordInput.value !== confirmPasswordInput.value) {
                        alert("Passwords do not match. Please enter the same password.");
                        event.preventDefault();
                        return false;
                    }

                    return true;
                }
            </script>
    </main>
</body>
</html>
