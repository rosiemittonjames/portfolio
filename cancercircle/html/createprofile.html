    <script>
        document.addEventListener('DOMContentLoaded', function() {
    const photoUploads = document.querySelectorAll('.photo-upload');

    photoUploads.forEach(upload => {
        const photosInput = upload.querySelector('.photos-input');
        const photoDisplay = upload.querySelector('.photo-display');
        const photoBox = upload.querySelector('.photo-box');
        const plusIcon = upload.querySelector('.plus-icon');

        photoBox.addEventListener('click', function() {
            photosInput.click();
        });

        photosInput.addEventListener('change', function(event) {
            const files = event.target.files;

            if (files.length > 0) {
                const imageUrl = URL.createObjectURL(files[0]);
                photoDisplay.src = imageUrl;
                photoDisplay.style.display = 'block';
                plusIcon.style.display = 'none';
            }
        });
    });
});


    </script>
