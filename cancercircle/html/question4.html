<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection to Cancer</title>
    <link href="question4.css" rel="stylesheet" type="text/css">
</head>
<body>
    <main>
        <section class="grid-container-flex">
            <div class="rectangle"></div> 

            <div class="container">
                <h1>What's your main connection to cancer?</h1>

                <div class="connection-row">
                    <button type="button" class="connectionbtn" data-url="question5a.html">I'm currently on my cancer journey</button>
                </div>
                <div class="connection-row">
                    <button type="button" class="connectionbtn" data-url="question5b.html">I'm a cancer survivor</button>
                </div>
                <div class="connection-row">
                    <button type="button" class="connectionbtn" data-url="question5d.html">I'm a caregiver</button>
                </div>
                <div class="connection-row">
                    <button type="button" class="connectionbtn" data-url="question5c.html">I'm a friend/family member</button>
                </div>

                <!-- Next button -->
                <button type="button" class="nextbtn">Next</button>
            </div>
        </section>
    </main>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-analytics.js";

          apiKey: "AIzaSyBGC6doZP1qWpUEZdCNpyR8ftq9EgOldns",
          authDomain: "cancer-circle.firebaseapp.com",
          projectId: "cancer-circle",
          storageBucket: "cancer-circle.firebasestorage.app",
          messagingSenderId: "639024686722",

      </script> 

    <script>
        
        document.addEventListener("DOMContentLoaded", function() {
    const connectionButtons = document.querySelectorAll(".connectionbtn");
    const nextButton = document.querySelector(".nextbtn");
    let selectedURL = "";

    connectionButtons.forEach(button => {
        button.addEventListener("click", function() {
            if (this.classList.contains("selected")) {
                // Deselect if already selected
                this.classList.remove("selected");
                selectedURL = "";
            } else {
                // Remove selection from all buttons
                connectionButtons.forEach(btn => btn.classList.remove("selected"));

                // Select clicked button
                this.classList.add("selected");

                // Store selected URL
                selectedURL = this.getAttribute("data-url");
            }
        });
    });

    nextButton.addEventListener("click", function() {
        if (selectedURL) {
            window.location.href = selectedURL; // Navigate to the selected page
        } else {
            alert("Please select an option before proceeding.");
        }
    });
});
    
    </script>
</body>
</html>
