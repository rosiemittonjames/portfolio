                <form action="question6.html" method="GET" onsubmit="return validateForm(event)">

                      <h1>I'm a caregiver</h1>

                      <label for="connection"><b>who are you giving care to?</b></label>
                      <input type="text" placeholder="who are you giving care to?" name="connection" id="connection">
                  
                      <label for="cancertype"><b>what type of cancer do they have?</b></label>

                      <div class="connection-row">
                        <label for="stage"><b>stage of cancer (if known)</b></label>
                    </div>
                    <div class="connection-row">
                        <button type="button" class="connectionbtn" data-value="stage">1</button>
                        <button type="button" class="connectionbtn" data-value="stage">2</button>
                        <button type="button" class="connectionbtn" data-value="stage">3</button>
                        <button type="button" class="connectionbtn" data-value="stage">4</button>
                      </div>

                      <label for="treatement"><b>what treatment did they have?</b></label>
                      <input type="text" placeholder="treatment" name="treatement" id="treatment">
                  
    
                      <button type="submit" class="nextbtn"></a>next</button>

                  <script>
                    document.addEventListener("DOMContentLoaded", function() {
    const connectionButtons = document.querySelectorAll(".connectionbtn");
    const selectedConnectionInput = document.getElementById("selectedConnection");
    const form = document.getElementById("questionForm");

    connectionButtons.forEach(button => {
        button.addEventListener("click", function() {
            if (this.classList.contains("selected")) {
                // Deselect if already selected
                this.classList.remove("selected");
                selectedConnectionInput.value = "";
            } else {
                // Remove selection from all buttons
                connectionButtons.forEach(btn => btn.classList.remove("selected"));

                // Select clicked button
                this.classList.add("selected");
                selectedConnectionInput.value = this.getAttribute("data-value");
            }
        });
    });

    form.addEventListener("submit", function(event) {
        if (!selectedConnectionInput.value) {
            event.preventDefault(); // Prevent form submission if no value is selected
            alert("Please select an option before proceeding.");
        }
    });
});
                </script>
